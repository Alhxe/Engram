# Engram — self-hosted backend runtime (Docker).
#
# The backend image is built and published to GHCR by CI on every backend change
# on master; this host only *pulls* and runs it. Auto-update is done by a small
# launchd poll (deploy/update.sh + deploy/com.engram.update.plist) that runs
# `docker compose pull && up -d` on a timer — this replaces watchtower, which is
# incompatible with the Docker Engine 29 API. The public door is a Cloudflare
# Tunnel run NATIVELY on the host (see ~/.cloudflared/config.yml), reaching this
# backend at 127.0.0.1:8080 — so cloudflared is intentionally NOT a container.
#
# Config/secrets come from ./engram.env (never committed). See engram.env.example.

services:
  backend:
    image: ghcr.io/alhxe/engram:latest
    container_name: engram-backend
    restart: unless-stopped
    env_file: ./engram.env
    environment:
      ENGRAM_PORT: "8080"
      ENGRAM_DB_PATH: /app/data/engram.db
      ENGRAM_ATTACHMENTS_DIR: /app/data/attachments
      ENGRAM_BACKUP_DIR: /app/data/backups
      # CORS + secrets (ENGRAM_CORS_ORIGINS, ENGRAM_JWT_SECRET,
      # ENGRAM_AI_ENCRYPTION_KEY) are injected from engram.env.
    volumes:
      - engram-data:/app/data
    # Loopback only: the public door is the Cloudflare Tunnel, not this port.
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  engram-data:
