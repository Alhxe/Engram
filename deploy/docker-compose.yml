# Engram — self-hosted backend runtime (Docker) + auto-update.
#
# The backend image is built and published to GHCR by CI on tag push; this host
# only *pulls* and runs it. watchtower polls GHCR and redeploys when a new image
# lands, so "publish a release -> live here" happens without any self-hosted CI
# runner. The public door is a Cloudflare Tunnel run NATIVELY on the host (see
# ~/.cloudflared/config.yml and deploy/README.md), reaching this backend at
# 127.0.0.1:8080 — so cloudflared is intentionally NOT a container here.
#
# Config/secrets come from ./engram.env (never committed). See engram.env.example.

services:
  backend:
    image: ghcr.io/alhxe/engram:latest
    container_name: engram-backend
    restart: unless-stopped
    env_file: ./engram.env
    environment:
      ENGRAM_PORT: "8080"
      ENGRAM_DB_PATH: /app/data/engram.db
      ENGRAM_ATTACHMENTS_DIR: /app/data/attachments
      ENGRAM_BACKUP_DIR: /app/data/backups
      # CORS + secrets (ENGRAM_CORS_ORIGINS, ENGRAM_JWT_SECRET,
      # ENGRAM_AI_ENCRYPTION_KEY) are injected from engram.env.
    volumes:
      - engram-data:/app/data
    # Loopback only: the public door is the Cloudflare Tunnel, not this port.
    ports:
      - "127.0.0.1:8080:8080"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: engram-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >-
      --label-enable
      --cleanup
      --interval 300
    # Only containers opting in via the watchtower.enable label are updated.

volumes:
  engram-data:
