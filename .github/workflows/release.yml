name: Publish backend image

# Builds the backend image and pushes it to GHCR on every push to master that
# touches the backend (and on vX.Y.Z tags, which also cut a GitHub Release).
# Runs on a native arm64 GitHub-hosted runner (free for public repos) to match
# the Apple Silicon deployment host — no QEMU, fast builds. Never self-hosted, so
# a public fork cannot execute anything on the deployment host; the host *pulls*
# the published image (see deploy/README.md).

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - ".github/workflows/release.yml"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write # create the GitHub Release on tags
      packages: write # push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases -> ghcr.io/alhxe/engram
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=match,pattern=v(\d+\.\d+(?:\.\d+)?),group=1

      - name: Build and push backend image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
