name: Release & Docker

# Publishes a multi-arch backend image to GHCR and cuts a GitHub Release when a
# vX.Y.Z tag is pushed. Runs ONLY on GitHub-hosted runners (never self-hosted),
# so a public fork cannot execute anything on the deployment host. The host then
# *pulls* the published image — deployment is decoupled from CI.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      packages: write # push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # lowercase owner/name -> ghcr.io/alhxe/engram
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=match,pattern=v(\d+\.\d+(?:\.\d+)?),group=1
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
